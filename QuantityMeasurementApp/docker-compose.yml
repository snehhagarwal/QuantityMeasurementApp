version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: qma_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: qma_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-yourpassword}
      POSTGRES_DB: qma_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qma_user -d qma_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: qma_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Auth Service ────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: qma_auth_service
    restart: unless-stopped
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - UseDatabase=${USE_DATABASE:-PostgreSQL}
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=qma_db;Username=qma_user;Password=${DB_PASSWORD:-yourpassword}
      - Jwt__SecretKey=${JWT_SECRET_KEY:-QuantityMeasurementApp_SuperSecretKey_AtLeast32Chars!}
      - Jwt__Issuer=${JWT_ISSUER:-QuantityMeasurementApi}
      - Jwt__Audience=${JWT_AUDIENCE:-QuantityMeasurementApiUsers}
      - Jwt__ExpiryHours=${JWT_EXPIRY_HOURS:-24}
      - Encryption__Key=${ENCRYPTION_KEY:-QuantityMeasurementApp_AES_EncryptionKey_AtLeast32Chars!}
      - Google__ClientId=${GOOGLE_CLIENT_ID:-your-google-client-id}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── QMA Service ─────────────────────────────────────────────────────────────
  qma-service:
    build:
      context: ./qma-service
      dockerfile: Dockerfile
    container_name: qma_qma_service
    restart: unless-stopped
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - UseDatabase=${USE_DATABASE:-PostgreSQL}
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=qma_service_db;Username=qma_user;Password=${DB_PASSWORD:-yourpassword}
      - Redis__ConnectionString=redis:6379
      - Jwt__SecretKey=${JWT_SECRET_KEY:-QuantityMeasurementApp_SuperSecretKey_AtLeast32Chars!}
      - Jwt__Issuer=${JWT_ISSUER:-QuantityMeasurementApi}
      - Jwt__Audience=${JWT_AUDIENCE:-QuantityMeasurementApiUsers}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── API Gateway ─────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: qma_api_gateway
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Jwt__SecretKey=${JWT_SECRET_KEY:-QuantityMeasurementApp_SuperSecretKey_AtLeast32Chars!}
      - Jwt__Issuer=${JWT_ISSUER:-QuantityMeasurementApi}
      - Jwt__Audience=${JWT_AUDIENCE:-QuantityMeasurementApiUsers}
      - ReverseProxy__Clusters__auth-cluster__Destinations__auth-service__Address=http://auth-service:8080
      - ReverseProxy__Clusters__qma-cluster__Destinations__qma-service__Address=http://qma-service:8080
    depends_on:
      - auth-service
      - qma-service

volumes:
  postgres_data:
  redis_data: